<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>자율주행 데이터 취득 네비게이션</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#0f111a"/>
<meta name="background-color" content="#0a0a0f"/>
<link rel="icon" href="./icons/icon-192.png"/>
<!-- iOS 홈 화면 추가용 -->
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="데이터취득"/>
<link rel="apple-touch-icon" href="./icons/icon-180.png"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Segoe UI',sans-serif;background:#0a0a0f;color:#e0e6f0;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* 현재구간 카드 접기/펼치기 헤더 */
#panel-card-wrap{flex-shrink:0;}
#panel-card-hdr{display:none;align-items:center;justify-content:space-between;height:30px;min-height:30px;padding:0 12px;background:#0d0f1a;border-bottom:1px solid #1a1e30;cursor:pointer;user-select:none;}
#panel-card-hdr-title{font-size:12px;font-weight:700;color:#4a5580;letter-spacing:.5px;}
#btn-panel-card-toggle{background:none;border:none;color:#4a5580;font-size:11px;cursor:pointer;padding:0;}
#panel-card-wrap.collapsed{height:30px;min-height:30px;max-height:30px;overflow:hidden;}
#panel-card-wrap.collapsed #panel-card-body{display:none!important;}

/* ── 헤더 ── */
#hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0f111a;border-bottom:1px solid #1e2230;flex-shrink:0;z-index:100;}
#hdr-title{font-size:15px;font-weight:700;color:#6b7aaa;white-space:nowrap;}
.sel-btn{background:#171b2e;border:1px solid #2a3050;color:#c8d0f0;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;transition:.15s;}
.sel-btn:hover,.sel-btn.active{background:#1f2d5a;border-color:#3d5abf;color:#fff;}

/* ── 메인 ── */
#main{flex:1;display:grid;grid-template-columns:1fr 440px;overflow:hidden;}

/* ── 지도 래퍼 ── */
#map-wrap{position:relative;overflow:hidden;}
#map{width:100%;height:100%;}

/* ── 턴바이턴 오버레이 (지도 위 상단) ── */
#turn-overlay{
  position:absolute;top:12px;left:12px;right:12px;z-index:1000;
  display:none;
  background:rgba(5,8,20,0.93);
  border:1.5px solid #1e2a50;
  border-radius:14px;
  padding:14px 16px;
  backdrop-filter:blur(8px);
  box-shadow:0 4px 24px rgba(0,0,0,0.6);
  pointer-events:none;
}
#turn-overlay.show{display:flex;align-items:center;gap:14px;}
#turn-arrow-box{
  width:60px;height:60px;flex-shrink:0;
  background:#111827;border:2px solid #1e3060;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
}
#turn-text-wrap{flex:1;min-width:0;}
#turn-dist{font-size:26px;font-weight:800;color:#facc15;line-height:1;}
#turn-unit{font-size:13px;color:#6b7aaa;margin-left:3px;}
#turn-instr{font-size:16px;font-weight:700;color:#e0eaff;margin-top:4px;}
#turn-road{font-size:11px;color:#4a5a80;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* GPS 로딩 표시 */
#gps-status{
  position:absolute;bottom:12px;left:12px;z-index:1000;
  background:rgba(5,8,20,0.85);border:1px solid #1e2a50;
  border-radius:8px;padding:5px 10px;font-size:11px;color:#6b7aaa;
  display:none;
}
#gps-status.show{display:block;}

/* OSRM 로딩 스피너 */
#route-loading{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:1001;background:rgba(5,8,20,0.9);border:1px solid #1e3060;
  border-radius:12px;padding:16px 24px;font-size:13px;color:#7090d0;
  display:none;align-items:center;gap:10px;
}
#route-loading.show{display:flex;}
.spinner{width:18px;height:18px;border:2px solid #1e3060;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 우측 패널 ── */
#panel{display:flex;flex-direction:column;background:#0d0f1a;border-left:1px solid #1a1e30;overflow:hidden;position:relative;}
/* 에딧 모드 시 우측 패널 전체 차단 오버레이 */
#panel-edit-block{display:none;position:absolute;inset:0;z-index:500;background:rgba(0,0,0,0.45);cursor:not-allowed;}
#panel.edit-locked #panel-edit-block{display:block;}
#sc-select{flex-shrink:0;padding:10px;border-bottom:1px solid #1a1e30;}
#sc-select select{width:100%;background:#141828;border:1px solid #252d50;color:#c0caee;padding:7px 10px;border-radius:7px;font-size:13px;cursor:pointer;}
#sc-select select option{background:#141828;}
#last-saved{font-size:11px;color:#4a5580;white-space:nowrap;margin-left:4px;letter-spacing:.02em;}
#hdr-right-group{display:flex;align-items:center;gap:8px;margin-left:auto;}

/* 현재 구간 카드 */
#cur-card{flex-shrink:0;padding:12px;border-bottom:1px solid #1a1e30;}
#cur-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
#cur-id{background:#1a2a5e;color:#7aa0ff;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;}
#cur-badge{background:#0f2a1a;color:#3ecf6e;padding:3px 8px;border-radius:4px;font-size:11px;}
#cur-arrow{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.place-tag{background:#131b30;border:1px solid #2a3555;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;color:#d0dcff;flex:1;text-align:center;}
.arrow-icon{color:#3d5abf;font-size:18px;flex-shrink:0;}
#cur-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.stat{background:#0f1420;border:1px solid #1e2540;border-radius:7px;padding:8px 6px;text-align:center;}
.stat-v{font-size:17px;font-weight:700;color:#fff;}
.stat-u{font-size:10px;color:#4a5580;margin-top:1px;}

/* 타이머 */
#timer-box{background:#0b1525;border:1px solid #1d3060;border-radius:9px;padding:10px;text-align:center;margin-bottom:10px;}
#timer-label{font-size:10px;color:#4a6090;margin-bottom:3px;letter-spacing:.05em;}
#timer-val{font-size:32px;font-weight:700;color:#60a5fa;font-variant-numeric:tabular-nums;}
#timer-phase{font-size:10px;margin-top:2px;}
.phase-drive{color:#4ade80;}
.phase-rest{color:#fb923c;}
/* 주행 타이머 5분 이하 — 정차 위치 탐색 경고 */
#timer-val.timer-low{color:#ef4444!important;animation:blink .8s infinite alternate;}
#timer-phase.show-warn{color:#ef4444;}

/* 컨트롤 */
#ctrl{display:flex;gap:6px;margin-bottom:8px;}
.ctrl-btn{flex:1;padding:9px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
#btn-prev{background:#1a1e30;color:#8898cc;border:1px solid #2a3050;flex:0 0 44px;font-size:16px;}
#btn-prev:hover{background:#252d50;}
#btn-play{background:#1d4ed8;color:#fff;}
#btn-play:hover{background:#2563eb;}
#btn-play.running{background:#c0392b;}
#btn-next{background:#1a1e30;color:#8898cc;border:1px solid #2a3050;flex:0 0 44px;font-size:16px;}
#btn-next:hover{background:#252d50;}
/* 경로 수정 모드 */
#btn-naver-map{background:#03c75a;color:#fff;border:none;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;white-space:nowrap;}
#btn-naver-map:hover{background:#02a84d;}
#btn-edit{margin-left:auto;background:#374151;color:#d1d5db;border:1px solid #4b5563;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
#btn-edit:hover{background:#4b5563;}
#btn-edit.active{background:#b45309;color:#fff;border-color:#d97706;}

/* 지도 하단 스택 (에딧바 + 경로안내) */
#bottom-stack{position:absolute;bottom:0;left:0;right:0;z-index:1002;display:flex;flex-direction:column;}
#edit-bar{
  display:none;align-self:center;margin:0 auto 8px;
  align-items:center;gap:10px;padding:10px 16px;
  background:rgba(10,10,20,0.92);border:1px solid #374151;border-radius:10px;
  backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,.6);
  white-space:nowrap;
}
#edit-bar.show{display:flex;}
#edit-hint{font-size:11px;color:#9ca3af;flex:1;text-align:center;}
#btn-wp-add,#btn-wp-del{background:#1f2937;color:#d1d5db;border:1px solid #4b5563;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
#btn-wp-add:hover{background:#065f46;border-color:#10b981;color:#fff;}
#btn-wp-del:hover{background:#7f1d1d;border-color:#ef4444;color:#fff;}
#btn-save-route{background:#16a34a;color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
#btn-save-route:hover{background:#15803d;}

/* 패널 리사이즈 핸들 */
#panel-resize-handle{
  position:absolute;left:0;top:0;bottom:0;width:5px;cursor:ew-resize;
  background:transparent;z-index:10;
}
#panel-resize-handle:hover,#panel-resize-handle.dragging{background:#3b82f688;}
#steps-resize-handle{
  height:6px;cursor:ns-resize;background:#1e2a50;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#steps-resize-handle::after{content:'';width:32px;height:3px;background:#374151;border-radius:2px;}

/* 경고 */
#warn{display:none;background:#7c1d13;border:1px solid #ef4444;border-radius:7px;padding:8px 12px;font-size:12px;color:#fca5a5;font-weight:600;text-align:center;margin-top:8px;animation:blink .7s infinite alternate;}
@keyframes blink{from{opacity:1}to{opacity:.5}}

/* 시나리오 수정 버튼 */
#btn-sc-edit{background:#1e2a50;color:#7aabff;border:1px solid #2a4080;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
#btn-sc-edit:hover:not(:disabled){background:#253360;}
#btn-sc-edit.active{background:#7c3aed;color:#fff;border-color:#8b5cf6;}
#btn-sc-edit:disabled,#btn-edit:disabled{opacity:0.35;cursor:not-allowed;}
/* 주행 기록 다운로드 */
#btn-export-log{background:#0f2a1a;color:#3ecf6e;border:1px solid #1f4a30;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
#btn-export-log:hover{background:#16401f;}
#export-log-count{margin-left:4px;font-size:10px;color:#7aabff;font-weight:700;}
#btn-clear-log{background:#1a1e30;color:#6b7aaa;border:1px solid #2a3050;border-radius:7px;padding:5px 8px;font-size:12px;cursor:pointer;}
#btn-clear-log:hover{background:#252d50;color:#fca5a5;}
.set-io-btn{background:#1a1e30;color:#9aa6d6;border:1px solid #2a3050;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.set-io-btn:hover{background:#252d50;color:#c0caee;}
/* 시나리오 수정 모드 — 헤더 저장 버튼(시나리오 수정 버튼과 동일 크기) + 일부 버튼 숨김 */
#btn-sc-save-hdr{display:none;background:#7c3aed;color:#fff;border:1px solid #8b5cf6;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
#btn-sc-save-hdr:hover{background:#6d28d9;}
#hdr.sc-editing #btn-sc-save-hdr{display:block;}
#hdr.sc-editing #btn-clear-log,
#hdr.sc-editing #btn-edit{display:none;}
/* 시나리오 수정 — 출발/도착 이름 편집 토글 (CSS 클래스 방식, innerHTML 교체 없음) */
.place-input{width:100%;background:transparent;border:none;border-bottom:1.5px solid #3b82f6;color:#d0dcff;font-size:12px;font-weight:600;text-align:center;outline:none;padding:2px 0;}
.sv-edit{display:none;}
#cur-card.sc-editing .sv-view{display:none;}
#cur-card.sc-editing .sv-edit{display:block;}
/* 시나리오 수정 중엔 현재 구간 헤더에 설정 내보내기/가져오기 노출 */
.sc-export-group{display:none;gap:6px;margin-left:auto;}
#cur-card.sc-editing .sc-export-group{display:flex;}

/* 구간 추가/삭제 버튼 — 시나리오 수정 모드일 때만 표시 */
#leg-mgmt-btns{display:none;gap:6px;margin:8px 10px 4px;}
#leg-mgmt-btns.show{display:flex;}

/* 구간 추가/삭제 버튼 */
.leg-mgmt-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 6px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;border:1.5px solid #3b82f6;background:#0d1a35;color:#60a5fa;}
.leg-mgmt-btn:hover:not(:disabled){background:#1a2f55;color:#93c5fd;}
.leg-del-btn{border-color:#ef4444;background:#1a0d0d;color:#f87171;}
.leg-del-btn:hover:not(:disabled){background:#2d1515;color:#fca5a5;}
.leg-mgmt-btn:disabled{opacity:0.28;cursor:not-allowed;border-style:dashed;}
#add-leg-form{display:none;padding:12px;border-top:1px solid #1a2040;background:#080c18;}
#add-leg-form.show{display:block;}
.alf-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.alf-field label{font-size:10px;color:#4a6090;display:block;margin-bottom:3px;}
.alf-field input{width:100%;background:#0d1525;border:1px solid #1e2a50;color:#c0d0f0;padding:5px 8px;border-radius:5px;font-size:12px;outline:none;}
.alf-field input:focus{border-color:#3b82f6;}
.alf-auto{background:#0d1525;border:1px solid #1e2a50;color:#facc15;padding:5px 8px;border-radius:5px;font-size:13px;font-weight:700;min-height:28px;}
#btn-alf-ok{width:100%;background:#16a34a;color:#fff;border:none;border-radius:7px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px;}
#btn-alf-ok:hover{background:#15803d;}
#btn-alf-cancel{width:100%;background:#1a1e30;color:#6b7aaa;border:1px solid #2a3050;border-radius:7px;padding:6px;font-size:11px;cursor:pointer;margin-top:4px;}
#btn-alf-cancel:hover{background:#252d50;}

/* 구간 목록 헤더 (접기/펼치기) */
#leg-list-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
#leg-list-hdr{display:flex;align-items:center;justify-content:space-between;height:30px;min-height:30px;padding:0 12px;background:#0d0f1a;border-bottom:1px solid #1a1e30;border-top:1px solid #1a1e30;cursor:pointer;flex-shrink:0;user-select:none;}
#leg-list-hdr-title{font-size:12px;font-weight:700;color:#4a5580;letter-spacing:.5px;}
#btn-leg-list-toggle{background:none;border:none;color:#4a5580;font-size:11px;cursor:pointer;padding:0;}
#leg-list-wrap.collapsed{flex:0 0 30px!important;height:30px!important;min-height:30px!important;max-height:30px!important;overflow:hidden;}
#leg-list-wrap.collapsed #leg-list{display:none!important;}
#leg-list-wrap.collapsed + #leg-mgmt-btns,
#leg-list-wrap.collapsed + #leg-mgmt-btns + #add-leg-form{display:none!important;}

/* 구간 목록 */
#leg-list{flex:1;overflow-y:auto;padding:0;}
#leg-list::-webkit-scrollbar{width:4px;}
#leg-list::-webkit-scrollbar-track{background:#0a0c14;}
#leg-list::-webkit-scrollbar-thumb{background:#252d50;border-radius:2px;}
.leg-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #141828;cursor:pointer;transition:.1s;}
.leg-item:hover{background:#111525;}
.leg-item.done{opacity:.38;}
.leg-item.active{background:#0d1e3a;border-left:4px solid #3b82f6;opacity:1!important;}
.leg-item.active .leg-id{color:#60a5fa;}
.leg-drag-handle{display:none;color:#3a4570;font-size:15px;cursor:grab;flex-shrink:0;padding:0 1px;}
.leg-item[draggable="true"] .leg-drag-handle{display:block;}
.leg-item[draggable="true"]:active{cursor:grabbing;}
.leg-item.dragging{opacity:.35;}
.leg-item.drag-over{box-shadow:inset 0 2px 0 #7c3aed,inset 0 -2px 0 #7c3aed;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-done{background:#1e3a1e;border:1.5px solid #2d6b2d;}
.dot-active{background:#3b82f6;box-shadow:0 0 6px #3b82f688;}
.dot-pending{background:#1a2040;border:1.5px solid #2a3555;}
.leg-id{font-size:13px;font-weight:700;color:#5568aa;width:58px;flex-shrink:0;}
.leg-info{flex:1;min-width:0;}
.leg-se{font-size:13px;color:#8898cc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.leg-meta{font-size:11px;color:#3a4570;margin-top:2px;}
.leg-check{color:#2d6b2d;font-size:16px;flex-shrink:0;}

/* 전체 경로 안내 — bottom-stack 안에서 flex 아이템 */
#steps-panel{
  background:rgba(7,9,20,0.95);backdrop-filter:blur(8px);
  border-top:1px solid #1e2a50;
  height:200px;min-height:60px;max-height:60vh;
  display:flex;flex-direction:column;overflow:hidden;
}
#steps-panel.collapsed{height:30px!important;min-height:30px!important;max-height:30px!important;}
#steps-panel.collapsed #steps-resize-handle,
#steps-panel.collapsed #steps-list{display:none!important;}
#steps-hdr{
  display:flex;align-items:center;justify-content:space-between;
  height:30px;min-height:30px;padding:0 12px;font-size:12px;font-weight:700;color:#4a5580;
  letter-spacing:.5px;flex-shrink:0;
}
#btn-steps-toggle{background:none;border:none;color:#4a5580;font-size:11px;cursor:pointer;padding:0;}
#steps-list{overflow-y:auto;flex:1;}
#steps-list::-webkit-scrollbar{width:4px;}
#steps-list::-webkit-scrollbar-thumb{background:#252d50;border-radius:2px;}
.step-item{display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid #0f1428;}
.step-item.step-current{background:#0a1628;border-left:3px solid #3b82f6;}
.step-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.step-body{flex:1;min-width:0;}
.step-instr{font-size:12px;color:#c8d0f0;font-weight:600;}
.step-item.step-arrive .step-instr{color:#4ade80;}

/* 완료 오버레이 */
#done-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:40px;}
#done-overlay.show{display:flex;}
#done-overlay h2{font-size:26px;color:#4ade80;}
#done-overlay p{font-size:13px;color:#6880aa;}
#btn-done{background:#16a34a;color:#fff;padding:12px 32px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}

@media(max-width:700px){
  /* ── 레이아웃 ── */
  /* grid 대신 flex column으로 전환 — 패널이 콘텐츠 높이만큼만 차지 */
  #main{
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    overflow-x:hidden;
  }
  /* 지도는 최소 38vh를 유지하고, 접힌 패널이 남긴 공간은 지도가 채움 */
  #map-wrap{
    flex:1 0 38vh;
    height:auto;
    min-height:38vh;
  }
  #panel{
    flex:none;           /* ← 핵심: 남은 공간 채우지 않음 */
    border-left:none;

function pauseGpsFollowByUser(){

//  OSRM 경로 요청 (실제 도로 경로 + 턴바이턴)
// ══════════════════════════════════════════════════════════
async function fetchOSRM(sLL,eLL,legId){
  // 이전 요청 취소
  if(osrmAbortCtrl){ try{osrmAbortCtrl.abort();}catch(_){} }
  osrmAbortCtrl=new AbortController();
  showRouteLoading(true);
  clearOSRM();

  // 경유 좌표 조합 (WAYPOINTS + start/end)
  const wps=WAYPOINTS[legId]||[];
  const pts=[
    `${sLL[1]},${sLL[0]}`,
    ...wps.map(w=>`${w[1]},${w[0]}`),
    `${eLL[1]},${eLL[0]}`
  ].join(';');

  const url=`https://router.project-osrm.org/route/v1/driving/${pts}?steps=true&geometries=geojson&overview=full`;
  try{
    const res=await fetch(url,{signal:osrmAbortCtrl.signal});
    const data=await res.json();
    if(data.code==='Ok'&&data.routes&&data.routes[0]){
      const route=data.routes[0];
      osrmDuration=route.duration; // 초 단위
      // 출발/도착 핀까지 정확히 이어지도록 첫/끝 좌표 고정
      const coords=route.geometry.coordinates;
      coords.unshift([sLL[1],sLL[0]]);
      coords.push([eLL[1],eLL[0]]);
      currentRouteCoords=coords;
      drawOSRMRoute(currentRouteCoords);
      // 다중 waypoint → legs 배열 flatten
      // depart/중간arrive 모두 제거 — 실제 회전 지시 스텝만 남김
      const allSteps=route.legs.flatMap(l=>l.steps||[]);
      osrmSteps=allSteps.filter((s,i,arr)=>{
        if(s.maneuver.type==='depart') return false;       // 출발 스텝 전부 제거
        if(s.maneuver.type==='arrive') return i===arr.length-1; // 마지막 arrive만
        return true;
      });
      currentStepIdx=0;
      if(osrmSteps.length>0) showNextStep(0,null);
      showTurnOverlay(true);
      updateCurStats();
      renderStepsList();
    }
  }catch(e){
    if(e.name==='AbortError') return;
    console.warn('OSRM 실패:',e);
    drawFallbackRoute(sLL,eLL);
    osrmDuration=null;
    updateCurStats();
  }finally{
    showRouteLoading(false);
    osrmAbortCtrl=null;
  }
}

function resetRouteProgress(coords){
  routeCumulativeMeters=[];
  routeProgressMeters=0;
  routeProgressInitialized=false;

  if(!coords||coords.length===0) return;

  routeCumulativeMeters=[0];
  for(let i=1;i<coords.length;i++){
    const prev=coords[i-1];
    const cur=coords[i];
    routeCumulativeMeters.push(
      routeCumulativeMeters[i-1]+map.distance([prev[1],prev[0]],[cur[1],cur[0]])
    );
  }
}

function drawOSRMRoute(coords){
  resetRouteProgress(coords);
  const latlngs=coords.map(c=>[c[1],c[0]]);

  // 지나간 경로는 회색, 남은 경로는 파란색으로 별도 레이어에 표시한다.
  passedRouteLine=L.polyline([],{
    color:'#6b7280',weight:7,opacity:0.95,lineCap:'round',lineJoin:'round'
  }).addTo(map);

  osrmLine=L.polyline(latlngs,{
    color:'#3b82f6',weight:7,opacity:0.93,lineCap:'round',lineJoin:'round'
  }).addTo(map);
}

function drawFallbackRoute(sLL,eLL){
  currentRouteCoords=[[sLL[1],sLL[0]],[eLL[1],eLL[0]]];
  resetRouteProgress(currentRouteCoords);

  passedRouteLine=L.polyline([],{
    color:'#6b7280',weight:5,opacity:0.9,dashArray:'8 4',lineCap:'round',lineJoin:'round'
  }).addTo(map);

  osrmLine=L.polyline([sLL,eLL],{
    color:'#3b82f6',weight:5,opacity:0.85,dashArray:'8 4',lineCap:'round',lineJoin:'round'
  }).addTo(map);
}

function clearOSRM(){
  [osrmOutline,osrmLine,passedRouteLine].forEach(l=>{if(l){try{map.removeLayer(l);}catch(_){}}});
  osrmOutline=osrmLine=passedRouteLine=null;
  osrmSteps=[]; osrmDuration=null; currentRouteCoords=null;
  routeCumulativeMeters=[];
  routeProgressMeters=0;
  routeProgressInitialized=false;
  showTurnOverlay(false);
}

// 실제 경로(OSRM) 좌표를 따라 전체 거리를 합산 (단위: km)
// coords: [[lng,lat], ...] (currentRouteCoords 형식)
function routeDistanceKm(coords){
  if(!coords||coords.length<2) return null;
  let d=0;
  for(let i=1;i<coords.length;i++){
    d+=haversine(coords[i-1][1],coords[i-1][0],coords[i][1],coords[i][0]);
  }
  return d/1000;
}


// GPS 위치를 현재 경로의 가장 가까운 선분에 투영한다.
// 반환값의 alongMeters는 경로 시작점부터 투영 지점까지의 누적 거리다.
function findNearestPointOnRoute(lat,lng){
  if(!currentRouteCoords||currentRouteCoords.length<2||routeCumulativeMeters.length<2) return null;

  const R=6371000;
  const DEG=Math.PI/180;
  let best=null;

  for(let i=0;i<currentRouteCoords.length-1;i++){
    const a=currentRouteCoords[i];     // [lng,lat]
    const b=currentRouteCoords[i+1];
    const meanLat=((a[1]+b[1]+lat)/3)*DEG;
    const cosLat=Math.max(0.000001,Math.cos(meanLat));

    const bx=(b[0]-a[0])*DEG*R*cosLat;
    const by=(b[1]-a[1])*DEG*R;
    const px=(lng-a[0])*DEG*R*cosLat;
    const py=(lat-a[1])*DEG*R;
    const len2=bx*bx+by*by;

    let t=len2>0?(px*bx+py*by)/len2:0;
    t=Math.max(0,Math.min(1,t));

    const projLng=a[0]+(b[0]-a[0])*t;
    const projLat=a[1]+(b[1]-a[1])*t;
    const dx=px-bx*t;
    const dy=py-by*t;
    const distanceMeters=Math.sqrt(dx*dx+dy*dy);
    const segmentMeters=routeCumulativeMeters[i+1]-routeCumulativeMeters[i];
    const alongMeters=routeCumulativeMeters[i]+segmentMeters*t;

    if(!best||distanceMeters<best.distanceMeters){
      best={
        segmentIndex:i,
        t,
        lat:projLat,
        lng:projLng,
        distanceMeters,
        alongMeters
      };
    }
  }

  return best;
}

function getRouteSplitAtMeters(progressMeters){
  if(!currentRouteCoords||currentRouteCoords.length<2||routeCumulativeMeters.length<2) return null;

  const total=routeCumulativeMeters[routeCumulativeMeters.length-1];
  const clamped=Math.max(0,Math.min(total,progressMeters));
  let segmentIndex=0;

  while(
    segmentIndex<routeCumulativeMeters.length-2&&
    routeCumulativeMeters[segmentIndex+1]<clamped
  ){
    segmentIndex++;
  }

  const startM=routeCumulativeMeters[segmentIndex];
  const endM=routeCumulativeMeters[segmentIndex+1];
  const span=Math.max(0.001,endM-startM);
  const t=Math.max(0,Math.min(1,(clamped-startM)/span));
  const a=currentRouteCoords[segmentIndex];
  const b=currentRouteCoords[segmentIndex+1];
  const splitLng=a[0]+(b[0]-a[0])*t;
  const splitLat=a[1]+(b[1]-a[1])*t;
  const split=[splitLat,splitLng];

  const passed=currentRouteCoords
    .slice(0,segmentIndex+1)
    .map(c=>[c[1],c[0]]);
  passed.push(split);

  const remaining=[split];
  for(let i=segmentIndex+1;i<currentRouteCoords.length;i++){
    remaining.push([currentRouteCoords[i][1],currentRouteCoords[i][0]]);
  }

  return {passed,remaining};
}

function renderRouteProgress(){
  if(!passedRouteLine||!osrmLine) return;
  const split=getRouteSplitAtMeters(routeProgressMeters);
  if(!split) return;

  passedRouteLine.setLatLngs(split.passed.length>=2?split.passed:[]);
  osrmLine.setLatLngs(split.remaining.length>=2?split.remaining:[]);

  // 남은 파란 경로가 분할 지점에서 회색 경로 위에 또렷하게 보이도록 한다.
  if(passedRouteLine.bringToFront) passedRouteLine.bringToFront();
  if(osrmLine.bringToFront) osrmLine.bringToFront();
  if(carMarker&&carMarker.bringToFront) carMarker.bringToFront();
}

function updatePassedRoute(lat,lng,currentSpeed=0,elapsedSec=0){
  if(!isPlaying||!currentRouteCoords||currentRouteCoords.length<2) return;

  const nearest=findNearestPointOnRoute(lat,lng);
  if(!nearest) return;

  // 경로와 너무 멀리 떨어진 GPS는 지나간 경로 계산에 사용하지 않는다.
  if(nearest.distanceMeters>120) return;

  if(!routeProgressInitialized){
    routeProgressMeters=nearest.alongMeters;
    routeProgressInitialized=true;
    renderRouteProgress();
    return;
  }

  // GPS 오차로 지나간 경로가 뒤로 되돌아가지 않도록 누적 진행률은 증가만 허용한다.
  if(nearest.alongMeters<=routeProgressMeters) return;

  // 교차로나 평행 도로에서 경로 후반으로 갑자기 점프하는 현상을 줄인다.
  // GPS 갱신 간격과 속도를 바탕으로 한 번에 허용할 최대 전진량을 정한다.
  const safeElapsed=Math.max(0,Number.isFinite(elapsedSec)?elapsedSec:0);
  const safeSpeed=Math.max(0,Number.isFinite(currentSpeed)?currentSpeed:0);
  const maxAdvance=Math.max(300,safeSpeed*safeElapsed*4+150);
  const advance=nearest.alongMeters-routeProgressMeters;

  if(safeElapsed>0&&safeElapsed<30&&advance>maxAdvance) return;

  routeProgressMeters=nearest.alongMeters;
  renderRouteProgress();
}

// ── 현재 구간 통계 갱신 ──────────────────────────────────────
// 거리 = 실제 경로 전체 길이 합산 (직접 입력 X)
// 목표속도 = 거리 / 계획시간
// 현재예상 = 계획시간(시나리오 설계 시 실제 경로 기준으로 보정된 값) — 직접 입력 X
// (※ 시간대별 "교통혼잡 배수" 같은 추정치는 실제 데이터가 아니라 빼버렸습니다.
//    실데이터 기반 ETA가 필요하면 실시간 교통 API 연동이 필요합니다.)
function getCurrentEtaMin(){
  const lg=legs[legIdx]; if(!lg) return 1;
  return Math.max(1,Math.round(lg.time));
}

function updateCurStats(){
  const lg=legs[legIdx]; if(!lg) return;

  const realDist=routeDistanceKm(currentRouteCoords);
  if(realDist!=null&&realDist>0) lg.dist=+realDist.toFixed(1);

  const targetSpd=lg.time>0?(lg.dist/lg.time*60):0;
  lg.spd=targetSpd;

  const etaMin=getCurrentEtaMin();

  document.getElementById('sv-dist-v').textContent=lg.dist.toFixed(1);
  document.getElementById('sv-spd-v').textContent=targetSpd.toFixed(1);
  document.getElementById('sv-time-v').textContent=etaMin;

  // 대기 중(미재생)일 때는 주행 타이머도 "현재예상"과 동일하게 표시
  if(!isPlaying&&phase==='drive') updateTimerDisplay(etaMin*60);
}

function getManeuverInfo(type,modifier){
  const mod=modifier||'straight';
  const base=MANEUVER_KO[type];
  if(!base) return {icon:'⬆',text:'계속 진행'};
  if(typeof base.icon!=='undefined') return base; // leaf
  return base[mod]||base['default']||{icon:'⬆',text:'계속 진행'};
}

// 거리 표시 단위 — '출발합니다'는 "앞으로 다가올 거리"가 아니라

// ══════════════════════════════════════════════════════════
//  음성 안내 (Web Speech API — TTS)
// ══════════════════════════════════════════════════════════
let ttsEnabled=true;          // 음소거 토글
let lastSpokenStep=-1;        // 중복 발화 방지
let lastWarnSpoken=false;     // 경로 이탈 중복 방지
let timerWarn5Spoken=false;   // 5분 경고 중복 방지

function speak(text, priority=false){
  if(!ttsEnabled) return;
  if(!window.speechSynthesis) return;
  if(priority) window.speechSynthesis.cancel(); // 높은 우선순위면 현재 발화 중단
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='ko-KR';
  utt.rate=1.05;
  utt.pitch=1.0;
  utt.volume=1.0;
  window.speechSynthesis.speak(utt);
}

// 음성 안내 버튼 (헤더에 추가)
function toggleTTS(){
  ttsEnabled=!ttsEnabled;
  const btn=document.getElementById('btn-tts');
  if(btn) btn.textContent=ttsEnabled?'🔊':'🔇';
  speak(ttsEnabled?'음성 안내를 켭니다':'음성 안내를 끕니다', true);
}

function getTurnVoiceText(step, distM){
  if(!step) return null;
  const info=getManeuverInfo(step.maneuver.type,step.maneuver.modifier);
  const road=step.name?` — ${step.name}`:'';
  if(step.maneuver.type==='arrive') return `목적지에 도착했습니다`;
  if(step.maneuver.type==='depart') return null;
  const distStr=distM>=1000?`${(distM/1000).toFixed(1)}킬로미터`:`${Math.round(distM/10)*10}미터`;
  return `${distStr} 앞 ${info.text}${road}`;
}

function showNextStep(idx,curPos){
  if(!osrmSteps.length) return;
  const step=osrmSteps[idx];
  if(!step) return;

  const info=getManeuverInfo(step.maneuver.type,step.maneuver.modifier);
  const stepLoc=step.maneuver.location;
  let dist=step.distance;
  if(curPos){
    dist=haversine(curPos[0],curPos[1],stepLoc[1],stepLoc[0]);
  }

  document.getElementById('turn-arrow').textContent=info.icon;
  document.getElementById('turn-dist').textContent=dist>=1000?(dist/1000).toFixed(1)+'km':Math.round(dist)+'m';
  document.getElementById('turn-unit').textContent=getDistUnitLabel(step.maneuver.type);
  document.getElementById('turn-instr').textContent=info.text;
  document.getElementById('turn-road').textContent=step.name||'';

  // 출발 음성 (경로 로드 완료 시)
  if(isPlaying&&lastSpokenStep<0){
    const lg=legs[legIdx];
    if(lg) speak(`${lg.e} 방향으로 출발합니다`, true);
    lastSpokenStep='started';
  }
}

function updateTurnFromPosition(lat,lng){
  if(!osrmSteps.length) return;

  // 현재 스텝의 분기점을 이미 지났으면 다음 스텝으로 이동
  // (분기점 40m 이내 + 이미 가장 가까웠다가 멀어지기 시작하면 통과로 간주)
  while(currentStepIdx<osrmSteps.length-1){
    const step=osrmSteps[currentStepIdx];
    const loc=step.maneuver.location; // [lng, lat]
    const d=haversine(lat,lng,loc[1],loc[0]);
    if(d<40){
      currentStepIdx++;
      highlightCurrentStep(currentStepIdx);
    } else { break; }
  }

  // 다음 분기점까지의 거리 표시
  const step=osrmSteps[currentStepIdx];
  if(!step) return;
  const loc=step.maneuver.location;
  const d=haversine(lat,lng,loc[1],loc[0]);
  const info=getManeuverInfo(step.maneuver.type,step.maneuver.modifier);

  document.getElementById('turn-arrow').textContent=info.icon;
  document.getElementById('turn-instr').textContent=info.text;
  document.getElementById('turn-dist').textContent=d>=1000?(d/1000).toFixed(1)+'km':Math.round(d)+'m';
  document.getElementById('turn-unit').textContent=getDistUnitLabel(step.maneuver.type);
  document.getElementById('turn-road').textContent=step.name||'';

  // 거리별 음성 안내 (500m / 200m / 50m)
  const SPEAK_DISTS=[500,200,50];
  for(const sd of SPEAK_DISTS){
    const key=`${currentStepIdx}_${sd}`;
    if(d<=sd+25&&d>=sd-25&&lastSpokenStep!==key){
      lastSpokenStep=key;
      const txt=getTurnVoiceText(step,d);
      if(txt) speak(txt);
      break;
    }
  }
}

function showTurnOverlay(show){

const PANEL_STATE_STORAGE_KEY='nav-panel-state-v1';

function setPanelCollapsed(elementId,buttonId,collapsed){
  const element=document.getElementById(elementId);
  const button=document.getElementById(buttonId);
  if(!element) return;
  element.classList.toggle('collapsed',Boolean(collapsed));
  if(button) button.textContent=collapsed?'펼치기 ▲':'접기 ▼';
}

function savePanelState(){
  try{
    const state={
      stepsCollapsed:document.getElementById('steps-panel')?.classList.contains('collapsed')??false,
      currentCollapsed:document.getElementById('panel-card-wrap')?.classList.contains('collapsed')??false,
      legsCollapsed:document.getElementById('leg-list-wrap')?.classList.contains('collapsed')??false
    };
    localStorage.setItem(PANEL_STATE_STORAGE_KEY,JSON.stringify(state));
  }catch(error){
    console.warn('패널 상태 저장 실패:',error);
  }
}

function restorePanelState(){
  let state=null;
  try{
    const saved=localStorage.getItem(PANEL_STATE_STORAGE_KEY);
    if(saved) state=JSON.parse(saved);
  }catch(error){
    console.warn('패널 상태 복원 실패:',error);
  }

  // 저장된 상태가 없는 첫 실행에서는 모바일 공간을 넓게 쓰도록 모두 접는다.
  if(!state){
    const collapseByDefault=window.innerWidth<=700;
    state={
      stepsCollapsed:collapseByDefault,
      currentCollapsed:collapseByDefault,
      legsCollapsed:collapseByDefault
    };
  }

  setPanelCollapsed('steps-panel','btn-steps-toggle',state.stepsCollapsed);
  setPanelCollapsed('panel-card-wrap','btn-panel-card-toggle',state.currentCollapsed);
  setPanelCollapsed('leg-list-wrap','btn-leg-list-toggle',state.legsCollapsed);
}

function refreshMapSize(){
  // 패널 접기/펼치기나 모바일 브라우저 UI 변화로 지도 영역 크기가 바뀐 뒤
  // Leaflet이 새 크기를 다시 계산하도록 한다. 지도 중심과 줌은 유지한다.
  if(!map) return;

  requestAnimationFrame(()=>{
    if(map && map._loaded){
      map.invalidateSize({pan:false,debounceMoveend:true});
    }
  });

  // 모바일 브라우저는 레이아웃 반영이 한 박자 늦을 수 있어 한 번 더 보정한다.
  clearTimeout(refreshMapSize._timer);
  refreshMapSize._timer=setTimeout(()=>{
    if(map && map._loaded){
      map.invalidateSize({pan:false,debounceMoveend:true});
    }
  },180);
}

function makeCarIcon(heading){

function updateCarMarker(lat,lng,heading){
  if(!carMarker){
    carMarker=L.marker([lat,lng],{icon:makeCarIcon(heading||0),zIndexOffset:2000}).addTo(map);

function loadScenario(restore){
  stopTimer();
  finalizeLegSession(legIdx,getGPSPos()); // 시나리오 전환 전 진행 중인 주행 세션 기록
  legStartTime=null; legStartPos=null;
  isPlaying=false;
  doneSet.clear();
  clearOSRM();
  showTurnOverlay(false);
  const sc=SCENARIOS[loc][scKey];
  legs=sc.legs;
  let idx=0;
  if(restore&&legs.length){
    let found=-1;
    if(restore.legId) found=legs.findIndex(l=>l.id===restore.legId);
    if(found>=0) idx=found;
    else if(typeof restore.legIdx==='number') idx=Math.min(Math.max(0,restore.legIdx),legs.length-1);
  }
  legIdx=idx;

  // 같은 위치·시나리오에서 사용자가 마지막으로 조정한 지도 화면이 있으면 복원한다.
  // 저장된 화면이 없을 때만 기본 중심/배율로 시작하고 GPS 자동 추적을 허용한다.
  const savedMapView=loadManualMapView();
  if(savedMapView){
    gpsAutoFollow=false;
    map.setView([savedMapView.lat,savedMapView.lng],savedMapView.zoom,{animate:false});
  }else{
    gpsAutoFollow=true;
    map.setView(SCENARIOS[loc].center,SCENARIOS[loc].zoom,{animate:false});
  }
  renderMap();
  renderLegList();
  renderCurLeg();
  updateHeader();
  document.getElementById('warn').style.display='none';
}

function renderMap(){
  [routeOutline,routeLine,activeOutline,activeLine].forEach(l=>l&&map.removeLayer(l));
  dotMarkers.forEach(m=>map.removeLayer(m));
  [startMk,endMk].forEach(m=>m&&map.removeLayer(m));
  dotMarkers=[];
  renderActiveLeg();
}

// ── SVG 물방울 핀 마커 (전역)
function svgPin(label,bg,textCol){

    <defs>
      <filter id="sh${label}" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="${bg}" flood-opacity="0.5"/>
      </filter>
    </defs>
    <path d="M19 2 C10 2 3 9 3 18 C3 30 19 46 19 46 C19 46 35 30 35 18 C35 9 28 2 19 2 Z"
      fill="${bg}" filter="url(#sh${label})" stroke="white" stroke-width="2"/>
    <text x="19" y="22" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif"
      font-size="10" font-weight="900" fill="${textCol}" letter-spacing="-0.3">${label}</text>
  </svg>`;

function renderActiveLeg(){
  [activeOutline,activeLine].forEach(l=>l&&map.removeLayer(l));
  [startMk,endMk].forEach(m=>m&&map.removeLayer(m));
  clearOSRM();
  if(!legs[legIdx]) return;

}

function renderLegList(){
  const el=document.getElementById('leg-list'); el.innerHTML='';
  legs.forEach((lg,i)=>{
    const done=doneSet.has(i),active=i===legIdx;
    const div=document.createElement('div');
    div.className='leg-item'+(done?' done':'')+(active?' active':'');
    div.id='li-'+i;
    div.innerHTML=`
      <span class="leg-drag-handle">⠿</span>
      <div class="leg-dot ${done?'dot-done':active?'dot-active':'dot-pending'}"></div>
      <div class="leg-id">${lg.id}</div>
      <div class="leg-info">
        <div class="leg-se">${lg.s} → ${lg.e}</div>
        <div class="leg-meta">${lg.dist}km · ${lg.time>0?(lg.dist/lg.time*60).toFixed(1):'—'}km/h · ${lg.time}분</div>
      </div>
      ${done?'<div class="leg-check">✓</div>':''}`;
    div.onclick=()=>jumpToLeg(i);
    if(scEditMode){
      div.draggable=true;
      div.addEventListener('dragstart',e=>{
        e.dataTransfer.setData('text/plain',String(i));
        e.dataTransfer.effectAllowed='move';
        div.classList.add('dragging');
      });
      div.addEventListener('dragend',()=>div.classList.remove('dragging'));
      div.addEventListener('dragover',e=>{ e.preventDefault(); div.classList.add('drag-over'); });
      div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
      div.addEventListener('drop',e=>{
        e.preventDefault();
        div.classList.remove('drag-over');
        const from=parseInt(e.dataTransfer.getData('text/plain'));
        if(!isNaN(from)) reorderLeg(from,i);
      });
    }
    el.appendChild(div);
  });
}

// 시나리오 수정 모드 — 구간 순서를 드래그로 변경
function reorderLeg(fromIdx,toIdx){
  if(fromIdx===toIdx||fromIdx<0||fromIdx>=legs.length||toIdx<0||toIdx>=legs.length) return;
  const activeLeg=legs[legIdx];
  const doneLegs=new Set([...doneSet].map(i=>legs[i]));

  const [moved]=legs.splice(fromIdx,1);
  legs.splice(toIdx,0,moved);

  // legIdx/doneSet을 새 배열 순서에 맞게 재매핑
  const newIdx=legs.indexOf(activeLeg);
  legIdx=newIdx>=0?newIdx:0;
  doneSet=new Set();
  legs.forEach((lg,i)=>{ if(doneLegs.has(lg)) doneSet.add(i); });

  saveWaypointsToStorage();
  renderLegList();
  const badgeEl=document.getElementById('cur-badge');
  if(badgeEl) badgeEl.textContent=`${legIdx+1} / ${legs.length} 구간`;
  updateHeader();
}

function renderCurLeg(){
  const lg=legs[legIdx]; if(!lg) return;
  // 시나리오 수정 모드 중 다른 구간으로 이동해도 편집 모드는 유지 —
  // 편집 입력값만 새 구간 기준으로 갱신 ("저장"을 눌러야만 모드 종료)
  if(scEditMode){
    document.getElementById('si-start').value=lg.s;
    document.getElementById('si-end').value=lg.e;
  }

  document.getElementById('cur-id').textContent=lg.id;
  document.getElementById('cur-badge').textContent=`${legIdx+1} / ${legs.length} 구간`;
  document.getElementById('cur-start').textContent=lg.s;
  document.getElementById('cur-end').textContent=lg.e;

  // 거리·목표속도·현재예상의 정확한 값은 경로 로딩 후 updateCurStats()에서 갱신됨.
  // 여기서는 경로 fetch 전 임시 표시값(현재예상 기준 — 타이머와 동일하게).
  const etaMin0=getCurrentEtaMin();
  document.getElementById('sv-dist-v').textContent=lg.dist.toFixed(1);
  document.getElementById('sv-spd-v').textContent=(lg.time>0?(lg.dist/lg.time*60):0).toFixed(1);
  document.getElementById('sv-time-v').textContent=etaMin0;
  setPhaseUI('drive');
  updateTimerDisplay(etaMin0*60);

  document.getElementById('btn-play').textContent=isPlaying?'⏸ 정지':'▶ 시작';
  document.getElementById('btn-play').className='ctrl-btn'+(isPlaying?' running':'');
}

function updateHeader(){
  const sc=SCENARIOS[loc][scKey];
  const el=document.getElementById('hdr-progress');
  if(el) el.textContent=`${loc} · ${sc.name} · ${doneSet.size}/${legs.length} 완료`;
}

// ══════════════════════════════════════════════════════════
//  타이머
// ══════════════════════════════════════════════════════════
function startTimer(sec){
  stopTimer(); timerSec=sec;
  updateTimerDisplay(timerSec);
  timerInterval=setInterval(()=>{
    timerSec--;
    updateTimerDisplay(timerSec);
    if(timerSec<=0){ if(phase==='drive') startRestPhase(); else advanceLeg(); }
  },1000);
}

function stopTimer(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} }

function startRestPhase(){
  stopTimer(); phase='rest'; setPhaseUI('rest');
  timerWarn5Spoken=false;
  speak('휴식 시간입니다. 안전한 곳에 정차하세요', true);
  startTimer(legs[legIdx].rest*60);
}

function setPhaseUI(p){
  const lbl=document.getElementById('timer-label');
  const ph=document.getElementById('timer-phase');
  if(p==='drive'){
    lbl.textContent='주행 타이머'; ph.textContent=''; ph.className='timer-phase phase-drive';
    document.getElementById('timer-val').style.color='#60a5fa';
  } else {
    lbl.textContent='휴식 타이머'; ph.textContent='🔴 휴식 중'; ph.className='timer-phase phase-rest';
    document.getElementById('timer-val').style.color='#fb923c';
  }
}

function updateTimerDisplay(sec){
  if(sec<0) sec=0;
  document.getElementById('timer-val').textContent=`${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
  const valEl=document.getElementById('timer-val');
  const phEl=document.getElementById('timer-phase');
  const warn=(phase==='drive'&&sec>0&&sec<=300);
  valEl.classList.toggle('timer-low',warn);
  if(phase==='drive'){
    phEl.textContent=warn?'🛑 5분 내 — 정차할 곳을 확인하세요':'';
    phEl.classList.toggle('show-warn',warn);
    if(warn&&!timerWarn5Spoken){ timerWarn5Spoken=true; speak('5분 후 휴식입니다. 정차할 곳을 확인하세요',true); }
    if(!warn) timerWarn5Spoken=false;
  }
}

// ══════════════════════════════════════════════════════════
//  재생 제어
// ══════════════════════════════════════════════════════════
function togglePlay(){
  if(isPlaying){
    isPlaying=false; stopTimer();
    gpsAutoFollow=false;
    manualMapPauseUntil=Number.POSITIVE_INFINITY;
    lastGpsSample=null;
    saveManualMapView();
    document.getElementById('btn-play').textContent='▶ 시작';
    document.getElementById('btn-play').className='ctrl-btn';
    finalizeLegSession(legIdx,getGPSPos());
    speak('주행을 정지합니다', true);
  } else {
    isPlaying=true; phase='drive'; setPhaseUI('drive');
    gpsAutoFollow=true;
    manualMapPauseUntil=0;
    lastGpsSample=null;
    legStartTime=new Date();
    legStartPos=getGPSPos()||[...legs[legIdx].sLL];
    lastSpokenStep=-1; lastWarnSpoken=false; timerWarn5Spoken=false;
    startTimer(getCurrentEtaMin()*60);
    document.getElementById('btn-play').textContent='⏸ 정지';
    document.getElementById('btn-play').className='ctrl-btn running';
    startGPS();
    const lg=legs[legIdx];
    fetchOSRM(lg.sLL,lg.eLL,lg.id);
  }
}

function advanceLeg(){
  stopTimer(); doneSet.add(legIdx);
  finalizeLegSession(legIdx,getGPSPos());
  legIdx++;
  if(legIdx>=legs.length){ isPlaying=false; speak('모든 구간을 완료했습니다. 수고하셨습니다!',true); showDone(); return; }
  phase='drive';
  legStartTime=new Date();
  legStartPos=getGPSPos()||[...legs[legIdx].sLL];
  lastSpokenStep=-1; lastWarnSpoken=false; timerWarn5Spoken=false;
  const lg=legs[legIdx];
  speak(`${legIdx+1}번 구간, ${lg.s}에서 ${lg.e}로 이동합니다`, true);
  updateLegUI();
  startTimer(getCurrentEtaMin()*60);
  fetchOSRM(lg.sLL,lg.eLL,lg.id);
}

function jumpToLeg(i){
  stopTimer();
  finalizeLegSession(legIdx,getGPSPos());
  legIdx=i; phase='drive'; isPlaying=false; legStartTime=null; legStartPos=null;
  updateLegUI();
}

function moveLeg(delta){
  const next=legIdx+delta;
  if(next<0||next>=legs.length) return;
  if(delta>0) doneSet.add(legIdx);
  jumpToLeg(next);
}

function updateLegUI(){
  renderMap(); renderLegList(); renderCurLeg(); updateHeader();
  document.getElementById('warn').style.display='none';
  const el=document.getElementById('li-'+legIdx);
  if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  saveCurrentView();
}

// ══════════════════════════════════════════════════════════
//  GPS
// ══════════════════════════════════════════════════════════
function startGPS(){
  if(!navigator.geolocation) return;
  document.getElementById('gps-status').classList.add('show');
  if(watchId!==null) return;
  watchId=navigator.geolocation.watchPosition(pos=>{
    const {latitude:lat,longitude:lng,heading,speed}=pos.coords;
    document.getElementById('gps-status').textContent=`📡 GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    // 방향 계산
    let h=heading||0;
    if(lastCarPos){
      const dlat=lat-lastCarPos[0], dlng=lng-lastCarPos[1];
      if(Math.abs(dlat)+Math.abs(dlng)>0.00001){
        h=Math.atan2(dlng,dlat)*180/Math.PI;
      }
    }
    const now=Date.now();
    const accuracy=Number.isFinite(pos.coords.accuracy)
      ? pos.coords.accuracy
      : 0;

    let movedMeters=0;
    let calculatedSpeed=0;
    let elapsedSec=0;

    if(lastGpsSample){
      elapsedSec=(now-lastGpsSample.time)/1000;
      movedMeters=map.distance(
        [lastGpsSample.lat,lastGpsSample.lng],
        [lat,lng]
      );

      if(elapsedSec>0){
        calculatedSpeed=movedMeters/elapsedSec;
      }
    }

    // 휴대폰이 GPS speed를 제공하면 해당 값을 우선 사용한다.
    const currentSpeed=
      Number.isFinite(speed)&&speed>=0
        ? speed
        : calculatedSpeed;

    // GPS 정확도가 좋지 않을 때는 이동 거리 판단 기준을 조금 높인다.
    const movementDistanceThreshold=Math.max(
      GPS_MOVING_DISTANCE_M,
      Math.min(accuracy,20)
    );

    // 속도 또는 짧은 시간 동안의 위치 변화로 실제 이동 여부를 판단한다.
    const gpsIsMoving=
      currentSpeed>=GPS_MOVING_SPEED_MPS||
      (
        elapsedSec>0&&
        elapsedSec<=10&&
        movedMeters>=movementDistanceThreshold
      );

    lastGpsSample={lat,lng,time:now};

    // 차량 마커는 GPS 추적 상태와 관계없이 항상 최신 위치로 이동한다.
    updateCarMarker(lat,lng,h);

    // 현재 GPS 위치까지 지나온 도로는 회색으로, 남은 도로는 파란색으로 갱신한다.
    updatePassedRoute(lat,lng,currentSpeed,elapsedSec);

    // 주행 중 실제 이동이 감지되면 GPS 위치를 지도 중심으로 따라간다.
    // 사용자가 지도를 조작한 경우에는 10초간 기다렸다가 자동 추적을 재개한다.
    if(isPlaying&&gpsIsMoving){
      if(now>=manualMapPauseUntil){
        gpsAutoFollow=true;
      }

      if(gpsAutoFollow){
        const distanceFromCenter=map.distance(
          map.getCenter(),
          [lat,lng]
        );

        // GPS 오차에 따른 미세한 흔들림을 줄이기 위해 8m 이상 차이 날 때만 이동한다.
        if(distanceFromCenter>=8){
          map.panTo([lat,lng],{
            animate:true,
            duration:0.35,
            easeLinearity:0.25
          });
        }
      }
    }

    // 턴 안내 업데이트
    updateTurnFromPosition(lat,lng);

    if(legs[legIdx]&&isPlaying){
      const lg=legs[legIdx];

      // ── 도착 자동 감지 (목적지 80m 이내) ──────────────────
      const dE=haversine(lat,lng,...lg.eLL);
      if(dE<80){
        speak(`${lg.e}에 도착했습니다`,true);
        advanceLeg();
        return;
      }

      // ── 경로 이탈 감지 (실제 경로 좌표 기준) ──────────────
      // currentRouteCoords가 있으면 경로상 최근접점 거리로 판단,
      // 없으면 단순 출발/도착 직선 기준
      let offRoute=false;
      if(currentRouteCoords&&currentRouteCoords.length>1){
        let minDist=Infinity;
        for(let i=0;i<currentRouteCoords.length;i++){
          const d=haversine(lat,lng,currentRouteCoords[i][1],currentRouteCoords[i][0]);
          if(d<minDist) minDist=d;
          if(minDist<80) break; // 충분히 가까우면 일찍 중단
        }
        offRoute=minDist>120; // 경로에서 120m 이상 벗어나면 이탈
      } else {
        const dS=haversine(lat,lng,...lg.sLL);
        offRoute=Math.min(dS,dE)>1000;
      }
      document.getElementById('warn').style.display=offRoute?'block':'none';
      if(offRoute&&!lastWarnSpoken){ lastWarnSpoken=true; speak('경로를 이탈했습니다. 파란 선으로 복귀하세요',true); }
      if(!offRoute) lastWarnSpoken=false;
    }
  },err=>{
    document.getElementById('gps-status').textContent='📡 GPS 권한 없음';
    console.warn('GPS 오류',err);
  },{enableHighAccuracy:true,maximumAge:1500,timeout:10000});
}

//  주소 해시(#) + localStorage에 저장. 파일을 다운로드해 일반 브라우저에서
//  열었을 때 새로고침해도 마지막 위치를 복원한다.
//  (Claude 채팅 내 미리보기는 새로고침마다 완전히 새로 그려지는 환경이라
//   클라이언트측 저장 자체가 유지되지 않을 수 있음)
// ══════════════════════════════════════════════════════════
function saveCurrentView(){
  const lg=legs[legIdx];
  const legId=lg?lg.id:'';
  const data={loc,scKey,legIdx,legId};
  const json=JSON.stringify(data);
  try{
    const hash='#'+encodeURIComponent(loc)+','+encodeURIComponent(scKey)+','+encodeURIComponent(legId);
    if(location.hash!==hash) history.replaceState(null,'',hash);
  }catch(e){}
  try{ localStorage.setItem('nav_current_view',json); }catch(e){}
}
function loadCurrentView(){
  if(location.hash&&location.hash.length>1){
    try{
      const parts=location.hash.slice(1).split(',').map(decodeURIComponent);
      if(parts[0]) return {loc:parts[0], scKey:parts[1], legId:parts[2]||null};
    }catch(e){}
  }
  try{
    const raw=localStorage.getItem('nav_current_view');
    return raw?JSON.parse(raw):null;
  }catch(e){ return null; }
}

// ══════════════════════════════════════════════════════════
//  유틸
// ══════════════════════════════════════════════════════════
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,d2r=Math.PI/180;
  const dLat=(lat2-lat1)*d2r, dLng=(lng2-lng1)*d2r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ══════════════════════════════════════════════════════════
//  구간 추가 (지도 마커로 좌표 설정 + OSRM 자동계산 + 역지오코딩)
// ══════════════════════════════════════════════════════════
let addLegMode=false, alfStartMk=null, alfEndMk=null;
let alfSLL=null, alfELL=null;
let alfOsrmDist=0, alfOsrmTime=0;

async function alfReverseGeocode(lat,lng,inputId){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ko`,
      {headers:{'Accept-Language':'ko'}});
    const d=await r.json();
    const a=d.address||{};
    const name=a.road||a.suburb||a.neighbourhood||a.village||a.city_district||a.city||(d.display_name||'').split(',')[0];
    const el=document.getElementById(inputId);
    if(el&&!el._userEdited) el.value=name||'';
  }catch(_){}
}

async function alfFetchOSRM(){
  if(!alfSLL||!alfELL) return;
  try{
    const url=`https://router.project-osrm.org/route/v1/driving/${alfSLL[1]},${alfSLL[0]};${alfELL[1]},${alfELL[0]}?overview=false`;
    const r=await fetch(url);
    const d=await r.json();
    if(d.code==='Ok'&&d.routes[0]){
      alfOsrmDist=+(d.routes[0].distance/1000).toFixed(1);
      alfOsrmTime=Math.max(1,Math.round(d.routes[0].duration/60));
      document.getElementById('alf-dist').textContent=alfOsrmDist+'km';
      document.getElementById('alf-time').textContent=alfOsrmTime+'분';
      const spd=alfOsrmTime>0?(alfOsrmDist/alfOsrmTime*60).toFixed(1):'—';
      document.getElementById('alf-spd-val').textContent=spd;
    }
  }catch(_){}
}

function toggleAddLegForm(){
  if(addLegMode){ cancelAddLeg(); return; }
  addLegMode=true;
  document.getElementById('add-leg-form').classList.add('show');

  // 기존 경로·마커 숨김 (깨끗한 지도)
  if(osrmLine){try{map.removeLayer(osrmLine);}catch(_){}}
  if(startMk){map.removeLayer(startMk);}
  if(endMk){map.removeLayer(endMk);}
  showTurnOverlay(false);
  document.getElementById('steps-panel').style.visibility='hidden';

  // 출발점 = 이전 구간 도착 좌표
  const lastLeg=legs[legs.length-1];
  alfSLL=lastLeg?[...lastLeg.eLL]:[...SCENARIOS[loc].center];
  alfELL=[alfSLL[0]-0.006, alfSLL[1]+0.008];

  document.getElementById('alf-s').value=lastLeg?lastLeg.e:'';
  document.getElementById('alf-e').value='';
  document.getElementById('alf-dist').textContent='계산 중...';
  document.getElementById('alf-time').textContent='계산 중...';
  document.getElementById('alf-spd-val').textContent='—';
  // 버튼 숨김
  document.getElementById('leg-mgmt-btns').classList.remove('show');

  // 역지오코딩 초기
  alfReverseGeocode(alfSLL[0],alfSLL[1],'alf-s');

  // 드래그 마커
  alfStartMk=L.marker(alfSLL,{icon:svgPin('출발','#00c73c','#fff'),draggable:true,zIndexOffset:1100}).addTo(map);
  alfEndMk  =L.marker(alfELL,{icon:svgPin('도착','#ff4444','#fff'),draggable:true,zIndexOffset:1100}).addTo(map);

  // 마커 이동 시 역지오코딩 + OSRM
  alfStartMk.on('dragend',function(){
    const ll=this.getLatLng(); alfSLL=[ll.lat,ll.lng];
    alfReverseGeocode(ll.lat,ll.lng,'alf-s');
    alfFetchOSRM();
  });
  alfEndMk.on('dragend',function(){
    const ll=this.getLatLng(); alfELL=[ll.lat,ll.lng];
    alfReverseGeocode(ll.lat,ll.lng,'alf-e');
    alfFetchOSRM();
  });

  // input을 사용자가 직접 수정하면 자동입력 잠금
  ['alf-s','alf-e'].forEach(id=>{
    const el=document.getElementById(id);
    el._userEdited=false;
    el.oninput=()=>{ el._userEdited=true; };
  });

  map.setView(alfSLL,map.getZoom());
  alfFetchOSRM();
  alfReverseGeocode(alfELL[0],alfELL[1],'alf-e');
}

  alfSLL=alfELL=null; alfOsrmDist=0; alfOsrmTime=0;

function addNewLeg(){
  const s=document.getElementById('alf-s').value.trim()||'출발지';
  const e=document.getElementById('alf-e').value.trim()||'도착지';
  const dist=alfOsrmDist||parseFloat(document.getElementById('alf-dist').textContent)||0;
  const time=alfOsrmTime||parseInt(document.getElementById('alf-time').textContent)||10;
  const spd=time>0?(dist/time*60):0;

  if(!alfSLL||!alfELL){ alert('출발·도착 마커를 지도에서 이동해 위치를 설정하세요.'); return; }

  const sc=SCENARIOS[loc][scKey];
  const prefix=sc.legs[0]?sc.legs[0].id.replace(/\d+$/,''):'NEW';

  sc.legs.push({id:newId,s,e,sLL:[...alfSLL],eLL:[...alfELL],dist,spd,time,rest:0});

  cancelAddLeg();
  saveWaypointsToStorage();
  loadScenario();
  saveCurrentView();
}

function deleteCurrentLeg(){
  if(!legs[legIdx]){ alert('삭제할 구간이 없습니다.'); return; }
  const lg=legs[legIdx];
  if(!confirm(`"${lg.id}: ${lg.s} → ${lg.e}" 구간을 삭제할까요?`)) return;

  if(legIdx>=sc.legs.length) legIdx=Math.max(0,sc.legs.length-1);
  saveWaypointsToStorage();
  loadScenario();

function enterEditMode(){
  if(!legs[legIdx]) return;
  editMode=true;
  const lg=legs[legIdx];
  const legId=lg.id;
  // 현재 WAYPOINTS 복사
  editWaypoints=(WAYPOINTS[legId]||[]).map(w=>[...w]);

  document.getElementById('btn-edit').classList.add('active');
  document.getElementById('edit-bar').classList.add('show');
  document.getElementById('panel').classList.add('edit-locked');
  document.getElementById('btn-sc-edit').disabled=true; // 시나리오 수정 비활성화

  // 기존 마커 제거 후 draggable:true로 새로 생성 (enable()은 신뢰 불가)
  if(startMk){ map.removeLayer(startMk); startMk=null; }
  if(endMk)  { map.removeLayer(endMk);   endMk=null; }

  startMk=L.marker(lg.sLL,{icon:svgPin('출발','#00c73c','#fff'),zIndexOffset:900,draggable:true}).addTo(map);
  endMk  =L.marker(lg.eLL,{icon:svgPin('도착','#ff4444','#fff'),zIndexOffset:900,draggable:true}).addTo(map);

  // 수정 시작 시 뷰 경계 고정 (auto-pan 고려해 시작 시점 경계로 제한)
  const editBounds=map.getBounds();
  function clampLL(mk){
    const ll=mk.getLatLng();
    const lat=Math.max(editBounds.getSouth(),Math.min(editBounds.getNorth(),ll.lat));
    const lng=Math.max(editBounds.getWest(), Math.min(editBounds.getEast(), ll.lng));
    if(lat!==ll.lat||lng!==ll.lng) mk.setLatLng([lat,lng]);
    return mk.getLatLng();
  }
  startMk.on('drag',function(){ clampLL(this); });
  startMk.on('dragend',function(){
    const ll=clampLL(this);
    lg.sLL=[ll.lat,ll.lng];
    refetchWithEditWaypoints();
  });
  endMk.on('drag',function(){ clampLL(this); });
  endMk.on('dragend',function(){
    const ll=clampLL(this);
    lg.eLL=[ll.lat,ll.lng];
    refetchWithEditWaypoints();
  });

  renderEditMarkers();
}

function addWaypointMidpoint(){
  // 경로 중간 지점에 경유점 추가
  const lg=legs[legIdx]; if(!lg) return;
  let mid;
  if(currentRouteCoords&&currentRouteCoords.length>2){
    const c=currentRouteCoords[Math.floor(currentRouteCoords.length/2)];
    mid=[c[1],c[0]];
  } else {
    mid=[(lg.sLL[0]+lg.eLL[0])/2,(lg.sLL[1]+lg.eLL[1])/2];
  }
  const insertIdx=findBestInsertIdx(mid);
  editWaypoints.splice(insertIdx,0,mid);
  renderEditMarkers();
  refetchWithEditWaypoints();
}

function removeLastWaypoint(){
  if(editWaypoints.length===0) return;
  editWaypoints.pop();
  renderEditMarkers();
  refetchWithEditWaypoints();
}

function findBestInsertIdx(ll){
  const lg=legs[legIdx];
  // 출발 + 경유점 + 도착 전체 배열에서 가장 가까운 세그먼트 찾기
  const pts=[[...lg.sLL],...editWaypoints,[...lg.eLL]];
  let bestIdx=editWaypoints.length, bestDist=Infinity;
  for(let i=0;i<pts.length-1;i++){
    const d=pointToSegmentDist(ll,pts[i],pts[i+1]);
    if(d<bestDist){bestDist=d; bestIdx=i;}
  }
  return bestIdx; // 이 인덱스 앞에 삽입 (출발 다음부터)
}

function pointToSegmentDist(p,a,b){
  // 단순 중점 거리 근사
  const mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2;
  return Math.hypot(p[0]-mx,p[1]-my);
}

function renderEditMarkers(){
  editMarkers.forEach(m=>{try{map.removeLayer(m);}catch(_){}});
  editMarkers=[];

  editWaypoints.forEach((wp,i)=>{
    const icon=L.divIcon({className:'',html:`
      <div style="width:22px;height:22px;background:#facc15;border:3px solid #fff;
        border-radius:50%;cursor:grab;box-shadow:0 0 8px #facc1588;
        display:flex;align-items:center;justify-content:center;
        font-size:9px;font-weight:700;color:#000;">${i+1}</div>`,
      iconSize:[22,22],iconAnchor:[11,11]});
    const m=L.marker(wp,{icon,draggable:true,zIndexOffset:800}).addTo(map);

    m.on('drag',function(){
      // 뷰 밖으로 나가면 즉시 클램프
      const b=map.getBounds(), ll=this.getLatLng();
      const lat=Math.max(b.getSouth(),Math.min(b.getNorth(),ll.lat));
      const lng=Math.max(b.getWest(), Math.min(b.getEast(), ll.lng));
      if(lat!==ll.lat||lng!==ll.lng) this.setLatLng([lat,lng]);
      editWaypoints[i]=[this.getLatLng().lat,this.getLatLng().lng];
    });
    m.on('dragend',function(){
      editWaypoints[i]=[this.getLatLng().lat,this.getLatLng().lng];
      refetchWithEditWaypoints();
    });

    editMarkers.push(m);
  });
}

async function refetchWithEditWaypoints(){
  if(!legs[legIdx]) return;
  const lg=legs[legIdx];
  // 임시로 WAYPOINTS 덮어써서 fetchOSRM 호출
  const orig=WAYPOINTS[lg.id];
  WAYPOINTS[lg.id]=editWaypoints.map(w=>[...w]);
  await fetchOSRM(lg.sLL,lg.eLL,lg.id);

}

function saveEditedRoute(){

// 현재 GPS 위치 (없으면 null)
function getGPSPos(){
  return lastCarPos?[lastCarPos[0],lastCarPos[1]]:null;
}

// 진행 중인 주행 세션을 주행기록에 한 줄 저장
// (시작 시각/위치 ~ 정지(또는 구간완료) 시각/위치, 위치는 GPS 실측 기준)
function finalizeLegSession(idx,endPos){
  const lg=legs[idx]; if(!lg||!legStartTime) return;
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const startD=legStartTime;
  const sPos=legStartPos||lg.sLL;
  const ePos=endPos||lg.eLL;
  const fmtPos=p=>`${p[0].toFixed(5)}, ${p[1].toFixed(5)}`;
  const entryId=Date.now()+'_'+Math.random().toString(36).slice(2,7);
  const entry={
    _id:entryId,
    date:todayStr(),
    startTime:`${pad(startD.getHours())}:${pad(startD.getMinutes())}:${pad(startD.getSeconds())}`,
    time:`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`,
    legId:lg.id, start:fmtPos(sPos), end:fmtPos(ePos),
  };
  const log=loadTripLog();
  log.push(entry);
  saveTripLog(log);
  updateTripLogCount();
  legStartTime=null; legStartPos=null;

  // 출발/도착 GPS 좌표를 건물·장소명으로 비동기 변환 (실패 시 좌표 그대로 유지)
  reverseGeocodePlace(sPos[0],sPos[1]).then(name=>updateTripLogPlace(entryId,'start',name));
  reverseGeocodePlace(ePos[0],ePos[1]).then(name=>updateTripLogPlace(entryId,'end',name));
}

// GPS 좌표 → 건물/장소명 (예: "서울대학교 시흥캠퍼스"). 실패 시 null.
async function reverseGeocodePlace(lat,lng){
  // 줌 레벨을 낮춰가며 재시도: 18(건물) → 16(도로/구역) → 12(동/구) → 8(시/도)
  for(const zoom of [18,16,12,8]){
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=${zoom}&addressdetails=1&namedetails=1&accept-language=ko`,
        {headers:{'Accept-Language':'ko'}});
      if(!r.ok){ console.warn('역지오코딩 HTTP',r.status,'zoom',zoom); continue; }
      const d=await r.json();
      if(d.error){ console.warn('역지오코딩 응답 오류:',d.error,'zoom',zoom); continue; }
      const a=d.address||{}, nd=d.namedetails||{};
      const name=nd['name:ko']||nd.name||d.name||
        a.university||a.college||a.school||a.amenity||a.building||a.tourism||a.leisure||a.office||a.shop||
        a.man_made||a.railway||a.aeroway||a.industrial||
        a.road||a.neighbourhood||a.suburb||a.quarter||a.village||a.town||
        a.city_district||a.city||a.county||a.state||
        (d.display_name||'').split(',')[0];
      if(name) return name;
    }catch(e){ console.warn('역지오코딩 오류:',e,'zoom',zoom); }
  }
  return null;
}

// 주행기록의 특정 항목(entryId)의 start/end 값을 장소명으로 갱신
function updateTripLogPlace(entryId,field,name){
  if(!name) return;
  const log=loadTripLog();
  const e=log.find(x=>x._id===entryId);
  if(!e) return;
  e[field]=name;
  saveTripLog(log);
}

}

function downloadTodayLogExcel(){
  const today=todayStr();
  const todayLogs=loadTripLog().filter(e=>e.date===today);
  if(todayLogs.length===0){
    alert('오늘 완료(✓)한 구간이 아직 없습니다.\n구간을 완료(◀▶ 이동 또는 타이머 종료)하면 자동으로 기록됩니다.');
    return;
  }
  const headers=['번호','날짜','시작시각','완료시각','구간ID','출발','도착'];
  const rows=todayLogs.map((e,i)=>[
    i+1,e.date,e.startTime||'',e.time,e.legId,e.start,e.end,
  ]);

  // 1) SheetJS(xlsx) 라이브러리가 정상 로드된 경우 → 진짜 .xlsx로 다운로드
  if(typeof XLSX!=='undefined'){
    try{
      const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
      ws['!cols']=[
        {wch:5},{wch:11},{wch:9},{wch:9},{wch:9},{wch:20},{wch:20},
      ];
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,'주행기록');
      XLSX.writeFile(wb,`주행기록_${today}.xlsx`);
      return;
    }catch(e){
      console.warn('.xlsx 내보내기 실패 → CSV로 대체:',e);
    }
  }

  // 2) 라이브러리를 못 불러왔거나 실패한 경우 → CSV(UTF-8 BOM)로 다운로드
  //    외부 라이브러리/네트워크 없이도 항상 동작하며, 엑셀에서 한글이 깨지지 않게 BOM 포함
  downloadCSV(headers,rows,`주행기록_${today}.csv`);
}

function downloadCSV(headers,rows,filename){
  const esc=v=>{
    const s=String(v==null?'':v);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  };
  const lines=[headers.map(esc).join(','),...rows.map(r=>r.map(esc).join(','))];
  const csv='\uFEFF'+lines.join('\r\n'); // BOM → 엑셀에서 한글 깨짐 방지
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function saveWaypointsToStorage(){
  try{
    const data={waypoints:WAYPOINTS, legCoords:{}, customLegs:{}};
    Object.keys(SCENARIOS).forEach(locKey=>{
      Object.keys(SCENARIOS[locKey]).forEach(scKey=>{
        const sc=SCENARIOS[locKey][scKey];
        if(!sc.legs) return;
        // 전체 legs 배열 스냅샷 (추가/삭제 포함)
        data.customLegs[`${locKey}-${scKey}`]=sc.legs.map(lg=>({
          id:lg.id,s:lg.s,e:lg.e,
          sLL:[...lg.sLL],eLL:[...lg.eLL],
          dist:lg.dist,spd:lg.spd,time:lg.time,rest:lg.rest||0
        }));
        sc.legs.forEach(lg=>{
          data.legCoords[lg.id]={sLL:lg.sLL,eLL:lg.eLL,dist:lg.dist,spd:lg.spd,time:lg.time};
        });
      });
    });
    localStorage.setItem('nav_custom_routes',JSON.stringify(data));
  }catch(e){console.warn('저장 실패:',e);}
  updateLastSaved();
}

function loadWaypointsFromStorage(){
  try{
    const raw=localStorage.getItem('nav_custom_routes');
    if(!raw) return;
    const data=JSON.parse(raw);
    if(data.waypoints) Object.assign(WAYPOINTS,data.waypoints);
    // 전체 legs 배열 복원 (추가/삭제된 구간 포함)
    if(data.customLegs){
      Object.keys(SCENARIOS).forEach(locKey=>{
        Object.keys(SCENARIOS[locKey]).forEach(scKey=>{
          const saved=data.customLegs[`${locKey}-${scKey}`];
          if(saved&&saved.length) SCENARIOS[locKey][scKey].legs=saved;
        });
      });
    } else if(data.legCoords){
      // 구버전 호환
      Object.values(SCENARIOS).forEach(loc=>{
        Object.values(loc).forEach(sc=>{
          if(!sc.legs) return;
          sc.legs.forEach(lg=>{
            const c=data.legCoords[lg.id];
            if(c){ lg.sLL=c.sLL;lg.eLL=c.eLL;if(c.dist!=null)lg.dist=c.dist;if(c.time!=null)lg.time=c.time; }
          });
        });
      });
    }
    console.log('✅ 저장된 경로 불러옴');
  }catch(e){console.warn('불러오기 실패:',e);}
}

async function handleImportFile(ev){
  const file=ev.target.files&&ev.target.files[0];
  ev.target.value=''; // 같은 파일 재선택 가능하도록 초기화
  if(!file) return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(!confirm('현재 경로 수정·시나리오 수정·구간 추가/삭제·주행기록을 가져온 파일 내용으로 덮어씁니다.\n계속할까요?')) return;

    if(data.waypoints) Object.assign(WAYPOINTS,data.waypoints);
    if(data.customLegs){
      Object.keys(SCENARIOS).forEach(locKey=>{
        Object.keys(SCENARIOS[locKey]).forEach(scK=>{
          const saved=data.customLegs[`${locKey}-${scK}`];
          if(saved&&saved.length) SCENARIOS[locKey][scK].legs=saved;
        });
      });
    }
    if(Array.isArray(data.tripLog)) saveTripLog(data.tripLog);
    if(data.lastSaved){ try{localStorage.setItem('nav_last_saved',data.lastSaved);}catch(_){} }

    saveWaypointsToStorage(); // 이번 파일의 localStorage에도 반영(다음 새로고침까지 유지)
    loadLastSaved();
    updateTripLogCount();

    // 위치/시나리오/구간 복원
    if(data.currentView&&SCENARIOS[data.currentView.loc]){
      loc=data.currentView.loc;
      if(SCENARIOS[loc][data.currentView.scKey]) scKey=data.currentView.scKey;
      applyLocUI(loc);
      const scSelEl=document.getElementById('sc-sel');
      if(scSelEl) scSelEl.value=scKey;
      loadScenario(data.currentView);
    } else {
      loadScenario();
    }
    saveCurrentView();
    alert('가져오기 완료!');
  }catch(e){
    alert('가져오기 실패: 올바른 설정 파일(JSON)인지 확인해주세요.\n'+e.message);
  }
}

// ══════════════════════════════════════════════════════════
//  패널 크기 조절 (드래그 리사이즈)
// ══════════════════════════════════════════════════════════
(function initResize(){
  // 우측 패널 ← 핸들 드래그
  let panelDragging=false, panelStartX=0, panelStartW=0;
  const panelHandle=document.getElementById('panel-resize-handle');
  panelHandle.addEventListener('mousedown',e=>{
    panelDragging=true; panelStartX=e.clientX;
    panelStartW=document.getElementById('panel').offsetWidth;
    panelHandle.classList.add('dragging');
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!panelDragging) return;
    const delta=panelStartX-e.clientX;
    const newW=Math.max(280,Math.min(680,panelStartW+delta));
    document.getElementById('main').style.gridTemplateColumns=`1fr ${newW}px`;
  });
  document.addEventListener('mouseup',()=>{
    if(!panelDragging) return;
    panelDragging=false;
    panelHandle.classList.remove('dragging');
    document.body.style.userSelect='';
  });

  // 경로 안내 패널 ↑ 핸들 드래그
  let stepsDragging=false, stepsStartY=0, stepsStartH=0;
  const stepsHandle=document.getElementById('steps-resize-handle');
  stepsHandle.addEventListener('mousedown',e=>{
    if(document.getElementById('steps-panel').classList.contains('collapsed')) return;
    stepsDragging=true; stepsStartY=e.clientY;
    stepsStartH=document.getElementById('steps-panel').offsetHeight;
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!stepsDragging) return;
    const delta=stepsStartY-e.clientY; // 위로 드래그 = 더 크게
    const newH=Math.max(60,Math.min(window.innerHeight*0.65,stepsStartH+delta));
    document.getElementById('steps-panel').style.height=newH+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!stepsDragging) return;
    stepsDragging=false;
    document.body.style.userSelect='';
  });
})();

const mapWrapEl=document.getElementById('map-wrap');
if(mapWrapEl && 'ResizeObserver' in window){
  const mapResizeObserver=new ResizeObserver(()=>refreshMapSize());
  mapResizeObserver.observe(mapWrapEl);
}

// 화면 회전·브라우저 크기 변경 시에도 지도 크기를 다시 계산한다.
window.addEventListener('orientationchange',()=>{
  setTimeout(refreshMapSize,300);
});
window.addEventListener('resize',refreshMapSize);

// 이전에 보고 있던 위치·시나리오·구간 복원 (새로고침/Ctrl+F5 대응)
{
  const savedView=loadCurrentView();
  if(savedView&&SCENARIOS[savedView.loc]){
    loc=savedView.loc;
    if(SCENARIOS[loc][savedView.scKey]) scKey=savedView.scKey;
  }
  applyLocUI(loc);
  const scSelEl=document.getElementById('sc-sel');
  if(scSelEl) scSelEl.value=scKey;
  loadScenario(savedView||undefined);
}

// ══════════════════════════════════════════════════════════
//  PWA — 서비스워커 등록 (오프라인 앱 셸)
//  file://로 직접 열면 서비스워커가 동작하지 않으므로(정상),
//  https로 호스팅했을 때만 등록됨.
// ══════════════════════════════════════════════════════════
if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost')){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'})
      .then(reg=>reg.update())
      .catch(e=>console.warn('SW 등록 실패:',e));
  });
}

</script>
</body>
